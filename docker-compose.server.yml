services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: qq-social-agent-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 8080
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./prompts:/app/prompts
      - ./server-data/ntqq:/app/.config/QQ:ro
      - ./config.yaml:/app/config.yaml:ro
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=3).read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  napcat:
    image: mlikiowa/napcat-docker:latest
    container_name: napcat
    restart: unless-stopped
    depends_on:
      - bot
    environment:
      - NAPCAT_UID=${NAPCAT_UID:-1000}
      - NAPCAT_GID=${NAPCAT_GID:-1000}
      - ACCOUNT=${NAPCAT_ACCOUNT:-1801507496}
    ports:
      - "127.0.0.1:6099:6099"
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:3001:3001"
    volumes:
      - ./server-data/napcat/config:/app/napcat/config
      - ./server-data/ntqq:/app/.config/QQ
    mac_address: 02:42:ac:11:00:02
