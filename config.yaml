bot:
  default_persona: zhangxuefeng
  persona_dir: prompts
  data_path: data/bot.sqlite3
  context_limit: 30
  active_reply_on_mention: true

access_control:
  allowed_groups:
    - 1026813421
  allowed_private_users:
    - 2776760548
    - 3115344487

deepseek:
  base_url: https://api.deepseek.com
  providers:
    deepseek:
      base_url: https://api.deepseek.com
      api_key_env: DEEPSEEK_API_KEY
      thinking: disabled
    siliconflow:
      base_url: https://api.siliconflow.cn/v1
      api_key_env: SILICONFLOW_API_KEY
      thinking: disabled
  model: siliconflow/MiniMaxAI/MiniMax-M2.5
  decision_model: siliconflow/Qwen/Qwen3.5-35B-A3B
  reply_model: siliconflow/MiniMaxAI/MiniMax-M2.5
  utility_model: siliconflow/MiniMaxAI/MiniMax-M2.5
  jargon_model: siliconflow/Qwen/Qwen3.5-35B-A3B
  memory_model: siliconflow/Qwen/Qwen3.5-35B-A3B
  style_model: siliconflow/MiniMaxAI/MiniMax-M2.5
  member_profile_model: siliconflow/MiniMaxAI/MiniMax-M2.5
  model_catalog:
    - deepseek/deepseek-v4-flash
    - deepseek/deepseek-v4-pro
    - siliconflow/Qwen/Qwen3.5-35B-A3B
    - siliconflow/MiniMaxAI/MiniMax-M2.5
    - siliconflow/Pro/moonshotai/Kimi-K2.6
  fallback_models:
    decision: deepseek/deepseek-v4-flash
    reply: deepseek/deepseek-v4-flash
    utility: deepseek/deepseek-v4-flash
    jargon: deepseek/deepseek-v4-flash
    memory: deepseek/deepseek-v4-flash
    style: deepseek/deepseek-v4-flash
    member_profile: deepseek/deepseek-v4-flash
  thinking: disabled
  usage_tracking_enabled: false
  reasoning_effort: high
  temperature: 0.72
  max_tokens: 260
  timeout_seconds: 30
  decision_timeout_seconds: 10
  decision_total_timeout_seconds: 18
  reply_timeout_seconds: 18
  reply_total_timeout_seconds: 28
  daily_review_timeout_seconds: 35
  daily_review_total_timeout_seconds: 75
  utility_timeout_seconds: 8
  utility_total_timeout_seconds: 12
  max_retries: 0

rate_control:
  daytime_work_intensity_percent: 8
  min_interval_seconds: 3
  hard_mention_interval_seconds: 1
  max_replies_per_10min: 40
  max_replies_per_hour: 180
  max_consecutive_replies: 4
  user_reply_cooldowns: {}
  quiet_hours:
    enabled: false
    start: "01:00"
    end: "08:00"

social_actions:
  enabled: true
  per_user_cooldown_seconds: 45
  per_group_cooldown_seconds: 6
  max_per_group_hour: 60
  emoji_ids:
    agree: "76"
    care: "49"
    laugh: "28"
    tease: "101"
    surprise: "32"
    applause: "99"
    heart: "66"
  poke:
    enabled: true
    familiar_user_ids:
      - 1535071184
      - 184589072
    global_cooldown_seconds: 300
    per_group_cooldown_seconds: 1800
    per_user_cooldown_seconds: 7200
    max_per_group_day: 4

daily_review:
  timezone: Asia/Shanghai
  hour: 0
  minute: 0
  catch_up_hours: 12
  message_limit: 140

image_ocr:
  enabled: true
  napcat_ocr_enabled: false
  max_images_per_message: 2
  max_text_chars_per_image: 220
  max_calls_per_minute: 18
  cache_ttl_seconds: 86400
  api_timeout_seconds: 8
  siliconflow_fallback_enabled: true
  siliconflow_api_key_env: SILICONFLOW_API_KEY
  siliconflow_base_url: https://api.siliconflow.cn/v1
  siliconflow_model: deepseek-ai/DeepSeek-OCR
  siliconflow_timeout_seconds: 20
  siliconflow_max_tokens: 512
  siliconflow_detail: high
  siliconflow_prompt: 请帮群聊机器人理解这张图：1. 用一句话说图里大概是什么；2. 转写图中能看清的文字；3. 如果像表情包/梗图，说明它大概在表达什么。简短输出。

fresh_search:
  enabled: true
  provider: auto
  max_external_queries_per_minute: 4
  timeout_seconds: 3
  max_results: 5
  cache_max_entries: 256
  cache_ttl_seconds: 300
  news_cache_ttl_seconds: 300
  sports_cache_ttl_seconds: 60
  web_cache_ttl_seconds: 1800
  failure_ttl_seconds: 30
  query_max_chars: 120
  tavily:
    api_key_env: TAVILY_API_KEY

jargon_selection:
  llm_selector_enabled: false

group_directory:
  sync_interval_seconds: 21600

history_sync:
  enabled: true
  backfill_count: 80

rag:
  enabled: true
  mode: hybrid
  embedding:
    enabled: true
    provider: siliconflow
    api_key_env: SILICONFLOW_API_KEY
    base_url: https://api.siliconflow.cn/v1
    model: BAAI/bge-m3
    dimensions: 0
    timeout_seconds: 8
    batch_size: 24
  retrieval:
    online_timeout_ms: 800
    lexical_candidates: 30
    semantic_candidates: 30
    max_items: 5
    max_context_chars: 1500
    min_score: 0.18
    exclude_recent_seconds: 900
  indexing:
    episode_gap_seconds: 600
    max_chunk_chars: 700
    max_chunk_messages: 6
    message_backfill_limit: 12000
    source_sync_interval_seconds: 30
    batch_pause_seconds: 1.0

private_tools:
  reply_delay_enabled: true
  reply_delay_min_seconds: 0.15
  reply_delay_max_seconds: 0.95

content_tools:
  onebot_timeout_seconds: 10
  deep_url_reader:
    enabled: true
    timeout_seconds: 8
    max_bytes: 1000000
    max_text_chars: 6000
    max_redirects: 3
    allowed_ports: [80, 443]
  file_content:
    enabled: true
    max_file_bytes: 2000000
    max_text_chars: 6000
    max_pdf_pages: 20
    require_declared_mime: true
  voice_transcript:
    enabled: true
    provider: siliconflow
    api_key_env: SILICONFLOW_API_KEY
    base_url: https://api.siliconflow.cn/v1
    model: FunAudioLLM/SenseVoiceSmall
    timeout_seconds: 20
    max_audio_bytes: 3000000
    max_transcript_chars: 2000

groups:
  default:
    enabled: true
    persona: zhangxuefeng
